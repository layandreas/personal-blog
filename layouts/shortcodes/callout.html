<div style="
  border-left: 4px solid #3b82f6;
  background: rgba(59, 130, 246, 0.08);
  border-radius: 0 var(--radius) var(--radius) 0;
  padding: 0.75em 1em;
  margin: 1.25em 0;
">
  <strong style="color: #3b82f6; display: flex; align-items: center; gap: 0.4em;">
    <span style="
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1.1em;
      height: 1.1em;
      border-radius: 50%;
      border: 2px solid #3b82f6;
      font-size: 0.75em;
      font-style: italic;
      font-family: serif;
      line-height: 1;
      flex-shrink: 0;
    ">i</span>
    {{ with .Get "title" }}{{ . }}{{ else }}Note{{ end }}
  </strong>
  <div style="margin-top: 0.25em;">{{ .Inner | markdownify }}</div>
</div>
